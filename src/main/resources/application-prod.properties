# ===============================================================
# =         PROD - Production Environment Configuration         =
# ===============================================================

# --- Database Settings ---
# Connect to the local MySQL database on the server
spring.datasource.url=jdbc:mysql://localhost:3306/caregiver_system?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=123456

# --- JPA / Hibernate Settings ---
# 'validate' is a safer choice in production. It ensures the schema matches
# the entities without making automatic changes.
#spring.jpa.hibernate.ddl-auto=validate
#
## Disable showing SQL queries in production logs to reduce noise.
#spring.jpa.show-sql=false

# Firebase Cloud Messaging
firebase.service-account.path=classpath:firebase-service-account.json


qwen.api.model=qwen-plus
# Firebase service account JSON path on EC2
firebase.key.path=/home/ec2-user/secrets/firebase-service-account.json

openweather.api.key=${OPENWEATHER_API_KEY:}
openweather.geo.url=http://api.openweathermap.org/geo/1.0/direct
openweather.weather.url=https://api.openweathermap.org/data/2.5/weather

waqi.api.key=${WAQI_API_KEY:}
waqi.api.url=https://api.waqi.info/feed

qwen.api.key=${QWEN_API_KEY:}
qwen.api.url=https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions

