spring.application.name=caregiver-task-system
spring.profiles.active=prod

spring.datasource.url=jdbc:mysql://localhost:3306/caregiver_system?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia%2FKuala_Lumpur&connectionTimeZone=Asia%2FKuala_Lumpur
spring.datasource.username=root
spring.datasource.password=123456

server.address=0.0.0.0
server.port=8080

gemini.api.key=YOUR_GEMINI_API_KEY
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent

openweather.api.key=${OPENWEATHER_API_KEY:}
openweather.geo.url=http://api.openweathermap.org/geo/1.0/direct
openweather.weather.url=https://api.openweathermap.org/data/2.5/weather

waqi.api.key=${WAQI_API_KEY:}
waqi.api.url=https://api.waqi.info/feed

qwen.api.key=${QWEN_API_KEY:}
qwen.api.url=https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions

# Align JDBC timestamps with app MYT usage (meal_schedule.recorded_at, meal_time, etc.)
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kuala_Lumpur

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.database=0

#spring.jpa.hibernate.ddl-auto=update
#spring.jpa.show-sql=true

# Firebase Cloud Messaging key file path (set in profile-specific properties)
firebase.key.path=
